<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#6366F1" />
  <title>语块本</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>" />
</head>
<body>

  <header class="header">
    <h1>📝 语块本</h1>
    <div class="header-actions">
      <button class="icon-btn" onclick="toggleSearch()">🔍</button>
      <button class="icon-btn" id="sync-btn" onclick="openSyncModal()" title="同步">🔄</button>
    </div>
  </header>

  <main>
    <div class="page active" id="p-today"></div>
    <div class="page" id="p-bank"></div>
    <div class="page" id="p-review"></div>
    <div class="page" id="p-stats"></div>
    <div class="page" id="p-vocab"></div>
  </main>

  <nav class="nav">
    <button class="nav-item active" data-page="today"><span class="ni">📋</span>今日</button>
    <button class="nav-item" data-page="bank"><span class="ni">📚</span>语料</button>
    <button class="nav-item" data-page="review"><span class="ni">🔄</span>复习</button>
    <button class="nav-item" data-page="vocab"><span class="ni">📖</span>生词</button>
    <button class="nav-item" data-page="stats"><span class="ni">📊</span>统计</button>
  </nav>

  <!-- Add / Edit Modal -->
  <div class="modal" id="modal">
    <div class="modal-bg"></div>
    <div class="modal-body">
      <div class="modal-title" id="modal-title">添加词组</div>
      <form onsubmit="return saveEntry(event)">
        <input type="hidden" id="edit-id" />
        <div class="field">
          <label>英文词组</label>
          <div class="input-row">
              <input type="text" id="f-phrase" placeholder="e.g. break the ice" required />
              <button type="button" class="mic-btn" data-target="f-phrase" data-lang="en-US" data-hint="请说出英文词组" onclick="startVoiceInput(this)">🎤</button>
            </div>
          <div class="mic-status" id="ms-f-phrase" style="font-size:.75rem;color:var(--muted);margin-top:4px;min-height:18px"></div>
        <div class="field">
          <label>中文释义</label>
          <div class="input-row">
            <input type="text" id="f-meaning" placeholder="打破僵局" required />
            <button type="button" class="mic-btn" data-target="f-meaning" data-lang="zh-CN" data-hint="请说出中文释义" onclick="startVoiceInput(this)">🎤</button>
          </div>
          <div class="mic-status" id="ms-f-meaning" style="font-size:.75rem;color:var(--muted);margin-top:4px;min-height:18px"></div>
        </div>
        <div class="field">
          <label>例句（可选）</label>
            <div class="input-row">
              <textarea id="f-example" rows="2" placeholder="I told a joke to break the ice at the meeting."></textarea>
              <button type="button" class="mic-btn" data-target="f-example" data-lang="en-US" data-hint="请说出英文例句" onclick="startVoiceInput(this)">🎤</button>
            </div>
            <div class="mic-status" id="ms-f-example" style="font-size:.75rem;color:var(--muted);margin-top:4px;min-height:18px"></div>
        </div>
        <div class="field">
          <label>例句翻译（可选）</label>
            <div class="input-row">
              <textarea id="f-example-cn" rows="2" placeholder="我讲了个笑话来打破会议上的僵局。"></textarea>
              <button type="button" class="mic-btn" data-target="f-example-cn" data-lang="zh-CN" data-hint="请说出例句翻译" onclick="startVoiceInput(this)">🎤</button>
            </div>
            <div class="mic-status" id="ms-f-example-cn" style="font-size:.75rem;color:var(--muted);margin-top:4px;min-height:18px"></div>
        </div>
        <div class="field-row">
          <div class="field" style="flex:1">
            <label>分类</label>
            <select id="f-category">
              <option>日常对话</option>
              <option>商务英语</option>
              <option>TED演讲</option>
              <option>阅读</option>
              <option>其他</option>
            </select>
          </div>
          <div class="field" style="flex:1">
            <label>来源（可选）</label>
            <input type="text" id="f-source" placeholder="如：TED演讲" />
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">保存</button>
      </form>
      <button class="btn btn-ghost btn-block mt-8" onclick="closeModal()">取消</button>
    </div>
  </div>


  <!-- Vocab Modal -->
  <div class="modal" id="vocab-modal">
    <div class="modal-bg" onclick="closeVocabModal()"></div>
    <div class="modal-body">
      <div class="modal-title" id="vocab-modal-title">添加生词</div>
      <form onsubmit="return saveVocabEntry(event)">
        <input type="hidden" id="vocab-edit-id" />
        <div class="field">
          <label>英文单词</label>
          <input type="text" id="vf-word" placeholder="e.g. essential" required />
        </div>
        <div class="field">
          <label>中文释义</label>
            <div class="input-row">
              <input type="text" id="vf-meaning" placeholder="打破僵局" required />
              <button type="button" class="mic-btn" data-target="vf-meaning" data-lang="zh-CN" data-hint="请说出中文释义" onclick="startVoiceInput(this)">🎤</button>
            </div>
            <div class="mic-status" id="ms-vf-meaning" style="font-size:.75rem;color:var(--muted);margin-top:4px;min-height:18px"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">保存</button>
      </form>
      <button class="btn btn-ghost btn-block mt-8" onclick="closeVocabModal()">取消</button>
    </div>
  </div>

  
  <!-- Sync Modal -->
  <div class="modal" id="modal-sync">
    <div class="modal-bg" onclick="closeSyncModal()"></div>
    <div class="modal-body">
      <div class="modal-title">同步设置</div>
      <p style="font-size:.8125rem;color:var(--muted);margin-bottom:12px">使用 GitHub Gist 实现多设备数据同步，无需服务器</p>
      <div class="field">
        <label>GitHub Token</label>
        <div class="input-row">
          <input type="password" id="sync-token" placeholder="ghp_xxxxxxxxxxxx" />
          <button type="button" class="btn btn-sm btn-ghost" onclick="var t=document.getElementById('sync-token');t.type=t.type==='password'?'text':'password'">👁</button>
        </div>
        <div style="font-size:.6875rem;color:var(--muted);margin-top:4px">需要 gist 读写权限，<a href="https://github.com/settings/tokens" target="_blank" style="color:var(--primary)">去 GitHub 生成</a></div>
      </div>
      <div class="field" id="sync-gist-field" style="display:none">
        <label>Gist ID</label>
        <input type="text" id="sync-gist-id" readonly style="background:var(--bg);font-size:.75rem" />
      </div>
      <div id="sync-status-msg" style="font-size:.8125rem;margin-bottom:12px;min-height:20px"></div>
      <div class="flex" style="gap:8px">
        <button class="btn btn-primary" style="flex:1" onclick="syncNow()">🔄 立即同步</button>
      </div>
      <div class="flex" style="gap:8px;margin-top:8px">
        <button class="btn btn-sm btn-outline" style="flex:1" onclick="syncToCloud()">📤 上传到云端</button>
        <button class="btn btn-sm btn-outline" style="flex:1" onclick="syncFromCloud()">📥 从云端下载</button>
      </div>
      <button class="btn btn-ghost btn-block mt-16" onclick="closeSyncModal()">关闭</button>
    </div>
  </div>

  <!-- Search Modal -->
  <div class="modal" id="modal-search">
    <div class="modal-bg" onclick="toggleSearch()"></div>
    <div class="modal-body">
      <div class="field">
        <input type="text" id="sq" placeholder="搜索词组、释义..." oninput="doSearch()" autofocus />
      </div>
      <div class="search-wrap" id="sr"></div>
    </div>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
