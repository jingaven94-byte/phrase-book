<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="Pragma" content="no-cache" />
  <meta http-equiv="Expires" content="0" />

  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#6366F1" />
  <title>语块本 [v1784563893]</title>
  <link rel="stylesheet" href="css/style.css?v=1784563739" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📝</text></svg>" />
</head>
<body>

  <header class="header">
    <h1>📝 语块本</h1>
    <div class="header-actions">
      <button class="icon-btn" onclick="toggleSearch()">🔍</button>
    </div>
  </header>

  <main>
    <div class="page active" id="p-today"></div>
    <div class="page" id="p-bank"></div>
    <div class="page" id="p-review"></div>
    <div class="page" id="p-stats"></div>
    <div class="page" id="p-vocab"></div>
  </main>

  <nav class="nav">
    <button class="nav-item active" data-page="today"><span class="ni">📋</span>今日</button>
    <button class="nav-item" data-page="bank"><span class="ni">📚</span>语料</button>
    <button class="nav-item" data-page="review"><span class="ni">🔄</span>复习</button>
    <button class="nav-item" data-page="vocab"><span class="ni">📖</span>生词</button>
    <button class="nav-item" data-page="stats"><span class="ni">📊</span>统计</button>
  </nav>

  <!-- Add / Edit Modal -->
  <div class="modal" id="modal">
    <div class="modal-bg"></div>
    <div class="modal-body">
      <div class="modal-title" id="modal-title">添加词组</div>
      <form onsubmit="return saveEntry(event)">
        <input type="hidden" id="edit-id" />
        <div class="field">
          <label>英文词组</label>
          <div class="input-row">
              <input type="text" id="f-phrase" placeholder="e.g. break the ice" required />
              <button type="button" class="mic-btn" data-target="f-phrase" data-lang="en-US" data-hint="请说出英文词组" onclick="startVoiceInput(this)">🎤</button>
            </div>
          <div class="mic-status" id="ms-f-phrase" style="font-size:.75rem;color:var(--muted);margin-top:4px;min-height:18px"></div>
        </div>
        <div class="field">
          <label>中文释义</label>
          <div class="input-row">
            <input type="text" id="f-meaning" placeholder="打破僵局" required />
            <button type="button" class="mic-btn" data-target="f-meaning" data-lang="zh-CN" data-hint="请说出中文释义" onclick="startVoiceInput(this)">🎤</button>
          </div>
          <div class="mic-status" id="ms-f-meaning" style="font-size:.75rem;color:var(--muted);margin-top:4px;min-height:18px"></div>
        </div>
        <div class="field">
          <label>例句（可选）</label>
            <div class="input-row">
              <textarea id="f-example" rows="2" placeholder="I told a joke to break the ice at the meeting."></textarea>
              <button type="button" class="mic-btn" data-target="f-example" data-lang="en-US" data-hint="请说出英文例句" onclick="startVoiceInput(this)">🎤</button>
            </div>
            <div class="mic-status" id="ms-f-example" style="font-size:.75rem;color:var(--muted);margin-top:4px;min-height:18px"></div>
        </div>
        <div class="field">
          <label>例句翻译（可选）</label>
            <div class="input-row">
              <textarea id="f-example-cn" rows="2" placeholder="我讲了个笑话来打破会议上的僵局。"></textarea>
              <button type="button" class="mic-btn" data-target="f-example-cn" data-lang="zh-CN" data-hint="请说出例句翻译" onclick="startVoiceInput(this)">🎤</button>
            </div>
            <div class="mic-status" id="ms-f-example-cn" style="font-size:.75rem;color:var(--muted);margin-top:4px;min-height:18px"></div>
        </div>
        <div class="field-row">
          <div class="field" style="flex:1">
            <label>分类</label>
            <select id="f-category">
              <option>日常对话</option>
              <option>商务英语</option>
              <option>TED演讲</option>
              <option>阅读</option>
              <option>其他</option>
            </select>
          </div>
          <div class="field" style="flex:1">
            <label>来源（可选）</label>
            <input type="text" id="f-source" placeholder="如：TED演讲" />
          </div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">保存</button>
      </form>
      <button class="btn btn-ghost btn-block mt-8" onclick="closeModal()">取消</button>
    </div>
  </div>


  <!-- Vocab Modal -->
  <div class="modal" id="vocab-modal">
    <div class="modal-bg" onclick="closeVocabModal()"></div>
    <div class="modal-body">
      <div class="modal-title" id="vocab-modal-title">添加生词</div>
      <form onsubmit="return saveVocabEntry(event)">
        <input type="hidden" id="vocab-edit-id" />
        <div class="field">
          <label>英文单词</label>
          <input type="text" id="vf-word" placeholder="e.g. essential" required />
        </div>
        <div class="field">
          <label>中文释义</label>
            <div class="input-row">
              <input type="text" id="vf-meaning" placeholder="打破僵局" required />
              <button type="button" class="mic-btn" data-target="vf-meaning" data-lang="zh-CN" data-hint="请说出中文释义" onclick="startVoiceInput(this)">🎤</button>
            </div>
            <div class="mic-status" id="ms-vf-meaning" style="font-size:.75rem;color:var(--muted);margin-top:4px;min-height:18px"></div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">保存</button>
      </form>
      <button class="btn btn-ghost btn-block mt-8" onclick="closeVocabModal()">取消</button>
    </div>
  </div>

  
  <!-- Sync Modal -->
  <div class="modal" id="modal-sync">
    <div class="modal-bg" onclick="closeSyncModal()"></div>
    <div class="modal-body">
      <div class="modal-title">⚙️ 同步设置</div>
      <p style="font-size:.8125rem;color:var(--muted);margin-bottom:12px">只需设置一次 GitHub Token，之后点击🔄即可一键同步所有数据</p>
      <div class="field">
        <label>GitHub Token</label>
        <div class="input-row">
          <input type="password" id="sync-token" placeholder="ghp_xxxxxxxxxxxx" />
          <button type="button" class="btn btn-sm btn-ghost" onclick="var t=document.getElementById('sync-token');t.type=t.type==='password'?'text':'password'">👁</button>
        </div>
        <div style="font-size:.6875rem;color:var(--muted);margin-top:4px">需要 repo 读写权限，<a href="https://github.com/settings/tokens" target="_blank" style="color:var(--primary)">去 GitHub 生成</a></div>
      </div>
      <div id="sync-status-msg" style="font-size:.8125rem;margin-bottom:12px;min-height:20px"></div>
      <button class="btn btn-primary btn-block" onclick="setupSync()">✅ 配置并同步</button>
      <div style="text-align:center;margin-top:12px">
        <a href="#" onclick="syncPull();closeSyncModal();return false" style="font-size:.8125rem;color:var(--muted);text-decoration:none">📥 从云端同步到这台设备</a>
      </div>
      <button class="btn btn-ghost btn-block mt-16" onclick="closeSyncModal()">关闭</button>
    </div>
  </div>

  <!-- Search Modal -->
  <div class="modal" id="modal-search">
    <div class="modal-bg" onclick="toggleSearch()"></div>
    <div class="modal-body">
      <div class="field">
        <input type="text" id="sq" placeholder="搜索词组、释义..." oninput="doSearch()" autofocus />
      </div>
      <div class="search-wrap" id="sr"></div>
    </div>
  </div>

  <script src="js/app.js?v=1784563739"></script>
  <!-- Sync Toast -->
  <div id="sync-toast" style="position:fixed;top:60px;left:50%;transform:translateX(-50%) translateY(-20px);padding:10px 20px;border-radius:8px;font-size:.8125rem;font-weight:600;z-index:300;opacity:0;transition:all .3s;pointer-events:none;max-width:90%;text-align:center"></div>

<!-- Force debug: check if inline script is running -->
<script>
// VISIBLE MARKER: If background turns pink, the inline script is running
document.body.style.setProperty('background', '#FFC0CB', 'important');
</script>
<!-- Force debug: override vocabDeleteEntry and syncAll to track deletions and apply filter -->
<script>
(function() {
  // Define getDeletedIds if not already defined (for cached app.js)
  if (typeof window.getDeletedIds !== 'function') {
    window.getDeletedIds = function() {
      try {
        var raw = localStorage.getItem('phrasebook_deleted');
        if (raw) {
          var parsed = JSON.parse(raw);
          if (parsed && typeof parsed === 'object') {
            if (!parsed.phrases) parsed.phrases = {};
            if (!parsed.vocab) parsed.vocab = {};
            return parsed;
          }
        }
      } catch(e) {}
      return { phrases: {}, vocab: {} };
    };
  }
  
  // Override vocabDeleteEntry with deletion tracking + visible toast
  window.vocabDeleteEntry = function(id, e) {
    if (e) e.stopPropagation();
    if (!confirm('删除这个生词？')) return;
    var delIds = window.getDeletedIds();
    delIds.vocab[id] = true;
    localStorage.setItem('phrasebook_deleted', JSON.stringify(delIds));
    
    // Show toast directly
    var t = document.getElementById('sync-toast');
    if (t) {
      t.textContent = '🗑 已记录删除: ' + JSON.stringify(delIds);
      t.style.background = '#EF4444';
      t.style.color = '#fff';
      t.style.opacity = '1';
      t.style.transform = 'translateX(-50%) translateY(0)';
      clearTimeout(t._hide);
      t._hide = setTimeout(function() {
        t.style.opacity = '0';
        t.style.transform = 'translateX(-50%) translateY(-20px)';
      }, 5000);
    }
    
    vocabData = vocabData.filter(function(v) { return v.id !== id; });
    if (typeof vocabSave === 'function') vocabSave();
    if (typeof renderVocab === 'function') renderVocab();
  };
  
  // Patch showSyncToast to apply deletion filter when sync completes
  if (typeof window.showSyncToast === 'function') {
    var _origToast = window.showSyncToast;
    window.showSyncToast = function(msg, isOk) {
      _origToast(msg, isOk);
      if (msg && msg.indexOf('完成') >= 0) {
        var delIds = window.getDeletedIds();
        var oldVocabLen = vocabData.length;
        var oldPhraseLen = data.length;
        vocabData = vocabData.filter(function(v) { return !(delIds.vocab && delIds.vocab[v.id]); });
        data = data.filter(function(p) { return !(delIds.phrases && delIds.phrases[p.id]); });
        if (vocabData.length !== oldVocabLen || data.length !== oldPhraseLen) {
          if (typeof vocabSave === 'function') vocabSave();
          if (typeof save === 'function') save();
          if (typeof nav === 'function') nav(page);
          // Show updated count
          setTimeout(function() {
            var t2 = document.getElementById('sync-toast');
            if (t2) {
              t2.textContent = '✅ 同步+过滤完成！词组' + data.length + ' · 生词' + vocabData.length;
              t2.style.background = '#10B981';
              t2.style.opacity = '1';
              t2.style.transform = 'translateX(-50%) translateY(0)';
              clearTimeout(t2._hide);
              t2._hide = setTimeout(function() {
                t2.style.opacity = '0';
                t2.style.transform = 'translateX(-50%) translateY(-20px)';
              }, 5000);
            }
          }, 500);
        }
      }
    };
  }
  
  // Also show deletion data before sync by wrapping syncAll
  if (typeof window.syncAll === 'function') {
    var _origSyncAll = window.syncAll;
    window.syncAll = function() {
      var delRaw = localStorage.getItem('phrasebook_deleted') || '(空)';
      var t = document.getElementById('sync-toast');
      if (t) {
        t.textContent = '🔍 删除追踪: ' + delRaw;
        t.style.background = '#6366F1';
        t.style.color = '#fff';
        t.style.opacity = '1';
        t.style.transform = 'translateX(-50%) translateY(0)';
        clearTimeout(t._hide);
        t._hide = setTimeout(function() {
          t.style.opacity = '0';
          t.style.transform = 'translateX(-50%) translateY(-20px)';
        }, 5000);
      }
      _origSyncAll();
    };
  }
})();
</script>

</body>
</html>
